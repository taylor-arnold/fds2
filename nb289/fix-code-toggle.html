<script>
document.addEventListener('DOMContentLoaded', function() {
  function toggleCodeHandler(show) {
    return function(e) {
      const detailsSrc = window.document.querySelectorAll(".cell > details .sourceCode");
      for (let i = 0; i < detailsSrc.length; i++) {
        const details = detailsSrc[i].closest('details');
        if (details) {
          if (show) {
            details.open = true;
          } else {
            details.removeAttribute("open");
          }
        }
      }
      return false;
    };
  }
  // Replace buttons to strip the broken listeners Quarto attached, then re-add fixed ones
  const hideAllCode = window.document.getElementById("quarto-hide-all-code");
  if (hideAllCode) {
    const fresh = hideAllCode.cloneNode(true);
    hideAllCode.parentNode.replaceChild(fresh, hideAllCode);
    fresh.addEventListener("click", toggleCodeHandler(false));
  }
  const showAllCode = window.document.getElementById("quarto-show-all-code");
  if (showAllCode) {
    const fresh = showAllCode.cloneNode(true);
    showAllCode.parentNode.replaceChild(fresh, showAllCode);
    fresh.addEventListener("click", toggleCodeHandler(true));
  }
});
</script>
